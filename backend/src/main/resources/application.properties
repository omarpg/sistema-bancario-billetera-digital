# =============================================
# SERVER
# =============================================
server.port=8080
spring.application.name=billetera-backend

# =============================================
# DATABASE
# =============================================
# Docker: No modificar (se sobrescribe desde docker-compose.yml)
# Supabase: Reemplaza con tus credenciales de Supabase
spring.datasource.url=jdbc:postgresql://localhost:5432/billetera_digital
spring.datasource.username=postgres
spring.datasource.password=postgres

# =============================================
# JPA/HIBERNATE
# =============================================
# Supabase: cambiar update por validate; comentar el dialect (Hibernate lo detecta automáticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT
# =============================================
# Docker: No modificar (se sobrescribe desde docker-compose.yml)
jwt.secret=billetera_digital_clave_desarrollo_debe_ser_muy_larga_al_menos_256_bits
jwt.expiration=86400000
# 86400000 ms = 24 horas

# =============================================
# CORS
# =============================================
cors.allowed-origins=http://localhost:3000,http://localhost:4321

# =============================================
# LOGGING
# =============================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE